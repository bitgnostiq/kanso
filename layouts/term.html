{{ define "main" }}
<article>
  <h1 style="margin-top: 0; font-weight: bold">
    content linked to
    <span class="pill"> {{ .Title }}</span>
  </h1>
  {{ .Content }}
  <div>
    <ol>
      {{ range .Pages }}
      <li class="list__items--horizontal" style="gap: var(--spacing-lg)">
        <span>{{- partial "date" . -}}</span>
        <a href="{{ .RelPermalink }}"> / {{ .LinkTitle }}</a>
      </li>
      {{ end }}
    </ol>
  </div>
</article>
{{ end }}
