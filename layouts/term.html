{{ define "main" }}
<article>
    <h1 style="margin-top: 0; font-weight: bold">
        content linked to  {{ .Title }}
    </h1>
    {{ .Content }}
    <div>
        <ol>
            {{ range .Pages }}
            <li class="list__item">
                <a href="{{ .RelPermalink }}"> / {{ .LinkTitle }}</a>
                <span>{{- partial "date" . -}}</span>
            </li>
            {{ end }}
        </ol>
    </div>
</article>
{{ end }}
