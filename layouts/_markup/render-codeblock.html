{{- $lang := .Type | upper }}
{{- if not (transform.CanHighlight .Type) }}
  {{- $lang = "TEXT" }}
{{- end }}
{{ $result := transform.HighlightCodeBlock . (dict "noClasses" false) }}
<div class="code-block">
  <div class="code-header">
    <span>{{ $lang }}</span>
    <button class="code-copy" aria-label="Copy code">Copy</button>
  </div>
  {{- $result.Wrapped }}
</div>
